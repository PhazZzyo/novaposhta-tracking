{% extends "base.html" %}
{% block title %}{{ t('add_user') }} - Admin{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-person-plus me-2"></i>{{ t('add_user') }}</h2>
<div class="row"><div class="col-md-6">
<div class="card"><div class="card-body">
<form method="POST">
    <div class="mb-3"><label class="form-label">{{ t('username') }} *</label>
        <input type="text" class="form-control" name="username" required placeholder="e.g. john.doe"></div>
    <div class="mb-3"><label class="form-label">{{ t('password') }} *</label>
        <input type="password" class="form-control" name="password" required minlength="6"></div>
    <div class="mb-3"><label class="form-label">{{ t('full_name') }}</label>
        <input type="text" class="form-control" name="full_name" placeholder="e.g. John Doe"></div>
    <div class="mb-3"><label class="form-label">{{ t('role') }} *</label>
        <select class="form-select" name="role">
            <option value="manager">Manager</option>
            <option value="courier">Courier</option>
            <option value="admin">Admin</option>
        </select></div>
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> {{ t('create_user') }}</button>
        <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">{{ t('cancel') }}</a>
    </div>
</form>
</div></div></div></div>
{% endblock %}
