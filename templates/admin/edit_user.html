{% extends "base.html" %}
{% block title %}{{ t('edit') }} {{ user.username }} - Admin{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-pencil me-2"></i>{{ t('edit') }}: {{ user.username }}</h2>
<div class="row"><div class="col-md-6">
<div class="card"><div class="card-body">
<form method="POST">
    <div class="mb-3"><label class="form-label">{{ t('username') }}</label>
        <input type="text" class="form-control" value="{{ user.username }}" disabled></div>
    <div class="mb-3"><label class="form-label">{{ t('full_name') }}</label>
        <input type="text" class="form-control" name="full_name" value="{{ user.full_name or '' }}"></div>
    <div class="mb-3"><label class="form-label">{{ t('role') }}</label>
        <select class="form-select" name="role">
            <option value="manager" {% if user.role == 'manager' %}selected{% endif %}>Manager</option>
            <option value="courier" {% if user.role == 'courier' %}selected{% endif %}>Courier</option>
            <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
        </select></div>
    <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="active" name="is_active" {% if user.is_active %}checked{% endif %}>
        <label class="form-check-label" for="active">Active</label></div>
    <hr>
    <div class="mb-3"><label class="form-label">{{ t('new_password') }}</label>
        <input type="password" class="form-control" name="new_password" minlength="6">
        <small class="text-muted">Leave blank to keep current</small></div>
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> {{ t('save_changes') }}</button>
        <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">{{ t('cancel') }}</a>
    </div>
</form>
</div></div></div></div>
{% endblock %}
