{% extends "base.html" %}
{% block title %}{{ t('change_password') }} - Nova Poshta{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-key me-2"></i>{{ t('change_password') }}</h2>
<div class="row"><div class="col-md-6 col-lg-4">
    <div class="card"><div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">{{ t('current_password') }}</label>
                <input type="password" class="form-control" name="current_password" required>
            </div>
            <div class="mb-3">
                <label class="form-label">{{ t('new_password') }}</label>
                <input type="password" class="form-control" name="new_password" required minlength="6">
            </div>
            <div class="mb-3">
                <label class="form-label">{{ t('confirm_password') }}</label>
                <input type="password" class="form-control" name="confirm_password" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-check-lg me-2"></i>{{ t('save_changes') }}
            </button>
        </form>
    </div></div>
</div></div>
{% endblock %}
